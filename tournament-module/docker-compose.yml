version: '3.8'

services:
  tournament-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tournament_db
      POSTGRES_USER: tournament
      POSTGRES_PASSWORD: tournament
    ports:
      - "5434:5432"
    volumes:
      - tournament_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tournament -d tournament_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  tournament-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: "postgresql://tournament:tournament@tournament-db:5432/tournament_db"
      JWT_SECRET: "change-me-in-production"
      PORT: "4000"
    depends_on:
      tournament-db:
        condition: service_healthy

  tournament-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4001:80"
    depends_on:
      - tournament-backend

volumes:
  tournament_pgdata:
